name: Publish & Deploy Docker Image

on:
  push:
    branches:
      - main

jobs:
  push_to_registry:
    name: Build & Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/booking-platform-api:latest
            ${{ secrets.DOCKER_USERNAME }}/booking-platform-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to DigitalOcean Droplet
    runs-on: ubuntu-latest
    needs: push_to_registry # Wait for the Docker build to finish first
    steps:
      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Your SSH Private Key
          script: |
            # Navigate to the repo on the droplet
            cd ~/booking-platform-api
            
            # Pull any new configuration files (e.g. compose.prod.yaml updates)
            git pull origin main
            
            # Pull the newly pushed image from Docker Hub
            docker compose -f compose.prod.yaml pull
            
            # Re-create and restart the containers with zero-downtime
            docker compose -f compose.prod.yaml up -d
